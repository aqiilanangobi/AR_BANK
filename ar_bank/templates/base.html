<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR BANK</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      min-height: 100vh;
      display: flex;
    }
    .sidebar {
      min-width: 220px;
      max-width: 220px;
      background: #343a40;
      color: #fff;
      flex-shrink: 0;
    }
    .sidebar a {
      color: #fff;
      display: block;
      padding: 12px 20px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #495057;
    }
    .content {
      flex-grow: 1;
      padding: 20px;
      background-color: #f8f9fa;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column">
    <h3 class="text-center py-3">AR BANK</h3>

    <a href="{% url 'home_page' %}">Home</a>
    <a href="{% url 'add_branch_page' %}">Branches</a>
    <a href="{% url 'add_accounttype_page' %}">Account Types</a>
    <a href="{% url 'add_customer_page' %}">Customers</a>
    <a href="{% url 'add_account_page' %}">Accounts</a>
    <a href="{% url 'add_employee_page' %}">Employees</a>
    <a href="{% url 'add_withdraw_page' %}">Withdraws</a>
    <a href="{% url 'add_deposit_page' %}">Deposits</a>
    <a href="{% url 'add_transfer_page' %}">Transfers</a>
    <a href="{% url 'add_transaction_page' %}">Transactions</a>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
      <a class="navbar-brand" href="#">AR BANK</a>

      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-link text-danger">Logout</button>
          </form>
        </li>
      </ul>
    </nav>

    <!-- Dynamic Content Block -->
    {% block content %}
    {% endblock content %}

  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  {% if messages %}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      {% for message in messages %}
          Swal.fire({
            title: "{{ message|escapejs }}",
            icon: "{{ message.tags }}",
            position: "center",
            showConfirmButton: false,
            timer: 2500,
            timerProgressBar: true
          });
      {% endfor %}
    });
  </script>
  {% endif %}

</body>
</html>
